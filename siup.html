<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
:root {
  --primary: #2c9785;
  --text: #202124;
  --subtext: #5f6368;
  --border: #dadce0;
  --bg: #f1f3f4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  background: #fff;
  width: 95%;
  max-width: 420px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.logo {
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 10px;
}
  .logo img {width:60px; height:60px; border-radius:50%;}

h2 {
  font-weight: 500;
  margin-bottom: 5px;
  color: var(--text);
}

.subtitle {
  font-size: 14px;
  color: var(--subtext);
  margin-bottom: 25px;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

.input-group input {
  width: 100%;
  padding: 14px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
}

.input-group label {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  background: #fff;
  padding: 0 4px;
  color: var(--subtext);
  font-size: 14px;
  transition: 0.2s;
}

.input-group input:focus,
.input-group input:valid {
  border-color: var(--primary);
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: -8px;
  font-size: 12px;
  color: var(--primary);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  background: var(--primary);
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.links {
  margin-top: 15px;
  font-size: 14px;
}

.links a {
  color: var(--primary);
  text-decoration: none;
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  color: var(--subtext);
}
</style>
</head>

<body>

<div class="container">
  <div class="logo"<img src="images/sallogo.jpg"></div>
  <h2>Create Account</h2>
  <div class="subtitle">join us today</div>

  <form>
    <div class="input-group">
      <input type="text" required>
      <label>Full Name</label>
    </div>

    <div class="input-group">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Password</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Confirm Password</label>
    </div>

    <button type="submit">Sign Up</button>
  </form>

  <div class="links">
    <p><a href="siip.html">Already have an account? Sign in</a></p>
  </div>

  <div class="footer">
    &copy; 2026 Sas Limited
  </div>
</div>

</body>
</html>
