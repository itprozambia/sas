<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>
:root {
  --primary: #2c9785;
  --text: #ffffff;
  --subtext: #5f6368;
  --border: #dadce0;
  --bg: #f1f3f4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* CARD */
.container {
  background: #fff;
  width: 95%;
  max-width: 400px;
  padding:20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 10px;
}

h2 {
  font-weight: 500;
  margin-bottom: 5px;
  color: var(--text);
}

.subtitle {
  font-size: 14px;
  color: var(--subtext);
  margin-bottom: 30px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  margin-bottom: 25px;
}

.input-group input {
  width: 100%;
  padding: 14px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
  font-size: 15px;
  transition: 0.3s;
}

.input-group label {
  position: absolute;
  top: 50%;
  left: 12px;
  color: var(--subtext);
  font-size: 14px;
  transform: translateY(-50%);
  background: #fff;
  padding: 0 4px;
  transition: 0.2s ease;
  pointer-events: none;
}

/* FLOATING LABEL EFFECT */
.input-group input:focus,
.input-group input:valid {
  border-color: var(--primary);
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: -8px;
  font-size: 12px;
  color: var(--primary);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 15px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #3c7bf1e3;
}

/* LINKS */
.links {
  margin-top: 20px;
  font-size: 14px;
}

.links a {
  color: var(--primary);
  text-decoration: none;
}

.links a:hover {
  text-decoration: underline;
}

/* FOOTER */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: var(--subtext);
}


@media(max-width:768px){
    .container {
        padding: 10px;
    }

    form {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">Oxytips</div>
  <h2>Sign in</h2>
  <div class="subtitle">Use your account</div>

  <form>
    <div class="input-group">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <input type="password" required>
      <label>Password</label>
    </div>

    <button type="submit">Next</button>
  </form>

  <div class="links">
    <p><a href="#">Forgot email?</a></p>
    <p><a href="siup.html">Create account</a></p>
  </div>

  <div class="footer">
    &copy; 2026 Oxytips
  </div>
</div>

</body>
</html>
